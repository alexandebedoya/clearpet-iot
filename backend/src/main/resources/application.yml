spring:
  application:
    name: clearpet-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clearpet_dev}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  # Google OAuth2 Configuration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile

  # Mail Configuration for Password Recovery
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MQTT Configuration
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
  client-id: ${MQTT_CLIENT_ID:clearpet-backend-client}
  topic: ${MQTT_TOPIC:clearpet/sensores/datos}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:clearpet-secret-key-must-be-at-least-256-bits-long-for-security-purposes-2024}
  expiration: 604800000

logging:
  level:
    root: INFO
    com.clearpet: DEBUG
    org.springframework.integration: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
