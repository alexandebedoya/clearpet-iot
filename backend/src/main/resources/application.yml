spring:
  application:
    name: biosense-iot-backend

  r2dbc:
    url: r2dbc:postgresql://switchyard.proxy.rlwy.net:28248/railway
    username: postgres
    password: JfdlYfNTrMqANfbzJTITBcSaNSRivRjc
    pool:
      initial-size: 5
      max-size: 20

  sql:
    init:
      mode: always

  # Configuración de Seguridad y Google OAuth2 (Variables de Entorno)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "https://biosense-iot-production.up.railway.app/api/auth/success"
        provider:
          google:
            user-name-attribute: email

  main:
    web-application-type: reactive

  # Configuración de Correo (Mail)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Configuración MQTT para los sensores MQ4 y MQ7
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
  client-id: ${MQTT_CLIENT_ID:biosense-iot-backend-client}
  topic: ${MQTT_TOPIC:biosense-iot/sensores/datos}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  error:
    include-message: always
    include-stacktrace: never

# Seguridad JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

# Client ID de Android para validación (Extra Config)
app:
  oauth2:
    android-client-id: ${ANDROID_CLIENT_ID:669903110693-jvrh6rsb15e7lg5in9vemeqqmbggr8fl.apps.googleusercontent.com}

logging:
  level:
    root: INFO
    com.biosense: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
