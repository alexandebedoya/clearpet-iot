spring:
  application:
    name: clearpet-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clearpet_dev}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  # Configuración de Seguridad y Google OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:669903110693-t5jtvf2tqk7jvn58vbjfa0r5me1euiri.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope:
              - email
              - profile
            redirect-uri: https://clearpet-iot-production.up.railway.app/login/oauth2/code/google
        provider:
          google:
            user-name-attribute: email

  # Configuración de Correo (Mail)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:tu-correo@gmail.com}
    password: ${MAIL_PASSWORD:tu-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Configuración MQTT para los sensores MQ4 y MQ7
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
  client-id: ${MQTT_CLIENT_ID:clearpet-backend-client}
  topic: ${MQTT_TOPIC:clearpet/sensores/datos}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  servlet:
    context-path: /
  error:
    include-message: always
    include-stacktrace: never

# Seguridad JWT para la comunicación con el celular
jwt:
  secret: ${JWT_SECRET:clearpet-secret-key-muy-larga-para-seguridad-2024-remington}
  expiration: 604800000

logging:
  level:
    root: INFO
    com.clearpet: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
